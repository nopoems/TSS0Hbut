    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }
        body { background-color: #f0f5fa; line-height: 1.6; color: #1e2b3c; padding: 0 16px 20px; }
        .container { max-width: 1400px; margin: 0 auto; background-color: white; border-radius: 32px 32px 24px 24px; box-shadow: 0 15px 35px rgba(0, 30, 60, 0.1); padding: 0 24px 32px; }
        .header { text-align: center; padding: 40px 20px 20px; background: linear-gradient(135deg, #eef5ff 0%, #ffffff 80%); border-bottom: 1px solid #d9e8f5; margin-bottom: 30px; }
        .header h1 { font-size: 2.5rem; font-weight: 600; color: #0a2942; margin-bottom: 8px; }
        .header h1 i { color: #2a6d9c; margin-right: 12px; }
        .header p { font-size: 1.15rem; color: #2f5575; background: rgba(42, 109, 156, 0.06); display: inline-block; padding: 8px 28px; border-radius: 40px; }
        .selector-wrapper { display: flex; justify-content: center; align-items: center; gap: 20px; margin: 30px 0 20px; flex-wrap: wrap; }
        select { padding: 12px 28px; font-size: 1.1rem; border-radius: 40px; border: 1px solid #b4d3ee; background-color: white; color: #0e3d5e; font-weight: 500; cursor: pointer; outline: none; box-shadow: 0 4px 8px rgba(0,30,60,0.05); }
        select:hover { border-color: #1d5b8c; }

        /* 卡片课表核心样式 (统一卡片，表格固定布局) */
        .timetable-container { overflow-x: auto; margin: 30px 0; background: #f7fcff; border-radius: 24px; padding: 20px; border: 1px solid #c3dff5; }
        table { 
            width: 100%; 
            border-collapse: collapse; 
            font-size: 0.82rem; 
            min-width: 1100px; 
            table-layout: fixed;
        }
        th { 
            background-color: #1d5b8c; 
            color: white; 
            padding: 14px 5px; 
            font-weight: 600; 
            border: 1px solid #357bb5; 
        }
        td { 
            border: 1px solid #b9d7f0; 
            padding: 8px 6px; 
            vertical-align: top; 
            background-color: white; 
        }
        /* 时间列固定宽度 */
        th:first-child, td:first-child { 
            width: 90px; 
            background-color: #e2effa; 
            font-weight: 600; 
            color: #0a2942; 
            text-align: center; 
            vertical-align: middle;
            white-space: nowrap;
        }
        /* 剩余7列等分 */
        th:not(:first-child), td:not(:first-child) { 
            width: calc((100% - 90px) / 7); 
        }

        /* 卡片样式 — 统一宽高，柔和卡片 */
        .course-card {
            background: #ffffff;
            border-radius: 14px;
            box-shadow: 0 4px 10px rgba(20, 50, 80, 0.08), 0 1px 3px rgba(0,0,0,0.05);
            padding: 8px 6px;
            height: 95px;                  /* 固定高度 */
            width: 100%;                    
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border: 1px solid #d0e6fa;
            transition: transform 0.1s ease, box-shadow 0.2s;
            margin: 4px 0;
            line-height: 1.4;
            text-align: center;
            overflow-y: auto;
            word-break: break-word;
        }
        .course-card:hover {
            box-shadow: 0 8px 18px rgba(0, 60, 120, 0.12);
            transform: scale(1.01);
            background: #f9fdff;
        }
        .course-card .course-name {
            font-weight: 700;
            color: #144a70;
            font-size: 0.86rem;
            margin-bottom: 3px;
            display: block;
        }
        .course-card .course-meta {
            color: #2f5575;
            font-size: 0.72rem;
            display: block;
            opacity: 0.9;
        }
        td:empty { background-color: #f7fcff; }

        .footer { margin-top: 40px; padding: 20px 10px 10px; text-align: center; color: #5d7690; font-size: 0.95rem; border-top: 2px dashed #b7d3ea; }
        .footer a { color: #1d5b8c; text-decoration: none; font-weight: 500; margin: 0 8px; }
        .footer a:hover { text-decoration: underline; }
        .note { background: #fff3cd; border-left: 6px solid #ffc107; padding: 15px; border-radius: 16px; margin: 20px 0 0; font-size: 0.9rem; }
        .note i { color: #b17d0b; margin-right: 6px; }

        td[rowspan] .course-card:not(:last-child) { margin-bottom: 6px; }
    </style>
</head>
