<!-- ================= 文件：departments.html ================= -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>理学院分团委 · 学生会部门职责</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }
        body { background-color: #f0f5fa; line-height: 1.6; color: #1e2b3c; padding: 0 16px 20px; }
        .container { max-width: 1280px; margin: 0 auto; background-color: white; border-radius: 32px 32px 24px 24px; box-shadow: 0 15px 35px rgba(0, 30, 60, 0.1); padding: 0 24px 32px; }
        .header { text-align: center; padding: 40px 20px 20px; background: linear-gradient(135deg, #eef5ff 0%, #ffffff 80%); border-bottom: 1px solid #d9e8f5; margin-bottom: 30px; }
        .header-logo {
            height: 100px;         /* 根据您的图片调整 */
            width: auto;
            object-fit: contain;}
        .header h1 { font-size: 2.5rem; font-weight: 600; color: #0a2942; margin-bottom: 8px; }
        .header h1 i { color: #2a6d9c; margin-right: 12px; }
        .header p { font-size: 1.15rem; color: #2f5575; background: rgba(42, 109, 156, 0.06); display: inline-block; padding: 8px 28px; border-radius: 40px; }
        .section-title { display: flex; align-items: center; gap: 12px; font-size: 1.9rem; font-weight: 600; color: #144a70; margin: 40px 0 24px 0; padding-bottom: 10px; border-bottom: 3px solid #c3dff5; }
        .grid-card { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 26px; margin-top: 8px; }
        .card { background: white; border-radius: 24px; padding: 20px 20px 24px; box-shadow: 0 10px 20px rgba(0, 30, 60, 0.08); border: 1px solid rgba(185, 215, 240, 0.4); display: flex; flex-direction: column; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 20px 30px rgba(21, 80, 130, 0.12); }
        .dept-name { font-size: 1.6rem; font-weight: 640; color: #003f66; margin-bottom: 8px; }
        .dept-intro { font-style: italic; color: #26648b; background: #ebf4fb; padding: 10px 14px; border-radius: 24px; margin: 10px 0 18px; border: 1px dashed #9ec3e0; }
        .duty-list { list-style: none; margin-top: 6px; }
        .duty-list li { padding: 8px 0 8px 32px; background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="%231d5b8c"><circle cx="12" cy="12" r="6"/></svg>') left center no-repeat; background-size: 18px; border-bottom: 1px solid #dae9f5; color: #1f4c70; }
        .duty-list li:last-child { border-bottom: none; }
        .footer { margin-top: 50px; padding: 20px 10px 10px; text-align: center; color: #5d7690; font-size: 0.95rem; border-top: 2px dashed #b7d3ea; }
        .footer a { color: #1d5b8c; text-decoration: none; font-weight: 500; }
        .footer a:hover { text-decoration: underline; }
        @media (max-width: 600px) { .header h1 { font-size: 1.9rem; } }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <img src="https://ts1.tc.mm.bing.net/th/id/R-C.79331acb245bf4082b5ec27439352584?rik=rIitBMlcp4cgEw&riu=http%3a%2f%2foss.vismatrix.cn%2fuploads%2f20210205%2fFkp8HcpbqDGZ7S3dxZpBXN4mfJPF.png&ehk=RRzAG2PK9SU6Lq7JWUjjCif%2feh2j9SxUFZpe9TCZJKs%3d&risl=&pid=ImgRaw&r=0" alt="理学院logo" class="header-logo">
        <h1><i class="fas fa-users-cog"></i> 理学院分团委 · 学生会部门职责</h1>
        <p>学生会各部门简介与详细职责</p>
    </div>

    <div class="section-title">
        <i class="fas fa-sitemap"></i>
        <span>⚙️ 部门职责与简介</span>
    </div>
    <div id="deptContainer" class="grid-card"></div>

    <div class="footer">
        <i class="fas fa-university"></i> 理学院学生会 · <a href="index.html">返回首页</a> &nbsp;|&nbsp; 部门专页
    </div>
</div>

<script>
    (function() {
        const departments = [
            { name: "主席团", 
                intro: "引领学生会发展方向，凝聚组织合力", 
                duties: [
                    "统筹学生会整体工作，牵头大型活动并负总责。", 
                    "协助思想引领，搭建沟通桥梁，推进思政教育。", 
                    "协调部门关系，建立督查机制，定期检查整改。", 
                    "关注学生动态，倾听诉求，反馈意见，搭建纽带。",
                ] 
            },
            { name: "蒲公英", 
                intro: "践行核心价值观，弘扬志愿精神", 
                duties: [
                    "负责志愿者招募与管理，策划活动", 
                    "构建“3+1”志愿服务体系，巩固品牌项目。", 
                    "宣传西部计划等，号召参与基层志愿服务。", 
                    "管理考核公益委员及志愿者。",
                    "建立校内外合作，整合资源，推动志愿服务事业。",
                ] 
            },
            { name: "组织部", 
                intro: "坚持党的领导，凝聚青年，服务青年", 
                duties: [
                    "组织团员学习党的创新理论与基本知识。", 
                    "结合节点开展红色教育，引导核心价值观。", 
                    "贯彻党组织决议，组织团员创先争优。", 
                    "加强团员发展和教育管理，规范程序，做好关系转接与纪律。",
                    "加强团组织规范化建设，推进骨干培训与指导。",
                ] 
            },
            { name: "宣传部", 
                intro: "传递学院声音、展现学生风采", 
                duties: [
                    "负责“理院风采”等平台日常运维与内容审核。", 
                    "推进“小理访谈”品牌，承担重大活动采编与典型宣传。", 
                    "对接各部门提供活动全流程宣传支持。", 
                    "组织院内征文等活动，策划班刊设计等特色活动。",
                    "对接校青年传媒中心，指导班级宣传委员协同构建宣传体系。"
                ] 
            },
            { name: "新媒体", 
                intro: "内容为本、创意为先、技术为桥、传播为效", 
                duties: [
                    "运营“与理同芯”公众号，编辑排版与审核推送。", 
                    "负责重要活动海报与展板制作，讲好理院故事。", 
                    "参与视频剪辑，提升内容感染力。",
                ] 
            },
            { name: "信联部", 
                intro: "严谨细致、专业高效、尽责保密", 
                duties: [
                    "及时把握学生动态，动态维护全院学生信息资料。", 
                    "组织开展晚点名，按时公示缺勤并记录。", 
                    "负责假期学生状态信息收集汇总。", 
                    "联络指导各班心理委员，组织主题班会并收集晴雨表。",
                    "统筹开展心理健康教育系列活动。",
                ] 
            },
            { name: "学工助理", 
                intro: "学院学生管理与服务体系中的重要辅助力量", 
                duties: [
                    "协助学工办日常事务，负责一站式社区环境维护。", 
                    "协助奖助学金及资助工作，审核材料与数据整理。", 
                    "协助新生开学注册与学生管理。", 
                    "定期开展实验室等公共教学场所卫生清理与秩序维护。",
                ] 
            },
           { name: "体育部", 
                intro: "丰富校园生活、增强学生体质", 
                duties: [
                    "承办院级体育赛事，保障活动全流程。", 
                    "组织参与校级及以上竞赛，做好后勤保障。", 
                    "宣传动员参与活动，普及健康意识。", 
                    "对接校体育部门，传达通知，确保衔接。",
                    "管理二级运动队伍，协助招募与训练。",
                ] 
            },
            { name: "生活权益部", 
                intro: "寝室管理、卫生建设、诉求传递", 
                duties: [
                    "统筹寝室卫生检查，宿舍安全隐患排查。", 
                    "组织安排卫生大扫除，明确标准与分工。", 
                    "负责校领导接待日工作，收集整理诉求。", 
                    "承担与各班生活委员联络，开展培训。",
                    "推进学院劳动教育工作,组织策划寝室文化节等特色活动。",
                ] 
            },
            { name: "学习部", 
                intro: "负责学院学风建设与学术发展工作", 
                duties: [
                    "组织各类学术竞赛，打造品牌，承办校级活动。", 
                    "开展日常四查机制,建立学生成长数据库", 
                    "统筹科技赛事宣传，对接校科协负责科技节布展。", 
                    "组织学生报名科研项目，规范管理档案并统筹申报。",
                    "审核创新创业类竞赛加分材料，配合学术科研评分。",
                ] 
            },
            { name: "文艺部", 
                intro: "提升学生艺术修养、营造良好校园文化氛围", 
                duties: [
                    "以文艺活动传递积极向上的校园文化价值观。", 
                    "对接校团委组织校级文艺赛事，遴选节目并统筹。", 
                    "自主策划举办院级文艺活动，丰富课余生活。", 
                    "负责文艺活动人员分工与物资筹备，整理归档。",
                ] 
            },
            { name: "秘书处", 
                intro: "连接学生、学生干部与学院管理体系的重要桥梁", 
                duties: [
                    "监督学生干部履职，执行考核制度并上报建议。", 
                    "协助开展综合素质测评，整理归档及学年鉴定。", 
                    "牵头组织新生《学生手册》考试，推动熟知规章。", 
                    "组织筹备学生会例会，开展会议记录检查。",
                    "负责评优评先监督，规范档案管理确保真实可追溯。",
                ] 
            },
                        
        ];

        function render() {
            const container = document.getElementById('deptContainer');
            if (!container) return;
            let html = '';
            departments.forEach(dept => {
                let dutiesHtml = '';
                dept.duties.forEach(d => { dutiesHtml += `<li>${d}</li>`; });
                html += `<div class="card">
                    <div class="dept-name"><i class="fas fa-sitemap" style="color: #1b6299;"></i> ${dept.name}</div>
                    <div class="dept-intro"><i class="fas fa-quote-right"></i> ${dept.intro}</div>
                    <ul class="duty-list">${dutiesHtml}</ul>
                </div>`;
            });
            container.innerHTML = html;
        }
        window.addEventListener('DOMContentLoaded', render);
    })();
</script>
</body>
</html>
